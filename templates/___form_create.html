<form {% if edit %} mix-patch="/api-update-destination/{{ destination.destination_pk }}" {% else %}
    mix-post="/api-create-destination" {% endif %} autocomplete="off" novalidate>

    <div>
        <label>Destination title <span>*</span></label>
        <label for=""><span>{{x.DESTINATION_TITLE_MIN}} to {{x.DESTINATION_TITLE_MAX}}
                characters</span></label>
        <input name="title" placeholder="title" type="text" value="{{ destination.destination_title if edit }}"
            mix-validate="{{x.REGEX_DESTINATION_TITLE}}" required>
    </div>

    <div>
        <label>Destination description</label>
        <textarea name="description" placeholder="description"
            type="text">{{ destination.destination_description if edit }}</textarea>
    </div>

    <div>
        <label>Country <span>*</span></label>
        <label for=""><span>{{x.DESTINATION_COUNTRY_MIN}} to {{x.DESTINATION_COUNTRY_MAX}}
                characters</span></label>
        <input name="country" placeholder="country" type="text" value="{{ destination.destination_country if edit }}"
            mix-validate="{{x.REGEX_DESTINATION_COUNTRY}}" required>
    </div>

    <div>
        <label>Location <span>* </span></label>
        <label for=""><span>{{x.DESTINATION_LOCATION_MIN}} to {{x.DESTINATION_LOCATION_MAX}}
                characters</span></label>
        <input name="location" placeholder="location" type="text" value="{{ destination.destination_location if edit }}"
            mix-validate="{{x.REGEX_DESTINATION_LOCATION}}" required>
    </div>

    <div>
        <label>Date from <span>*</span></label>
        <input name="date_from" type="date"
            value="{% if edit %}{{ destination.destination_date_from | int | timestamp_to_date }}{% endif %}" required>
    </div>

    <div>
        <label>Date to <span>*</span></label>
        <label for=""><span>Date to has to be after date from</span></label>
        <input name="date_to" type="date"
            value="{% if edit %}{{ destination.destination_date_to | int | timestamp_to_date }}{% endif %}" required>
    </div>

    <button type="submit" class="btn-primary">
        {% if edit %}Update destination{% else %}Create destination{% endif %}
    </button>

</form>
